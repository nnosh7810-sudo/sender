<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sender</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 400px;
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      color: #007bff;
      margin-bottom: 10px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .label {
      font-size: 16px;
      margin-bottom: 8px;
      text-align: left;
    }

    .input-box {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: 2px solid #ccc;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
    }

    .button {
      width: 100%;
      padding: 14px;
      background: #6a11cb;
      background: linear-gradient(135deg, #007bff, #6a11cb);
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      margin-bottom: 25px;
      cursor: pointer;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">Sender</div>
    <div class="title" id="title">Get your unique chat number</div>

    <div class="label" id="step1">Step 1: Enter Your Code</div>
    <input id="codeInput" class="input-box" placeholder="6-digit code" />

    <button class="button" onclick="getNumber()" id="btn1">
      Get My Number
    </button>

    <div class="label" id="step2">Step 2: Get Verification Code</div>
    <input id="phoneInput" class="input-box" placeholder="+000XXXXXXXXXXX" />

    <button class="button" onclick="verify()" id="btn2">
      Get Verification Code
    </button>

    <div class="footer">sender.com</div>
  </div>

  <script>
    // قراءة اللغة من الرابط
    const params = new URLSearchParams(window.location.search);
    const lang = params.get("lang") || "en";

    if (lang === "ar") {
      document.body.style.direction = "rtl";

      document.getElementById("title").innerText = "احصل على رقم الدردشة الفريد الخاص بك";
      document.getElementById("step1").innerText = "الخطوة 1: أدخل الرمز";
      document.getElementById("step2").innerText = "الخطوة 2: احصل على رمز التحقق";
      document.getElementById("btn1").innerText = "احصل على رقمي";
      document.getElementById("btn2").innerText = "احصل على رمز التحقق";

      document.getElementById("codeInput").placeholder = "رمز من 6 أرقام";
      document.getElementById("phoneInput").placeholder = "رقم هاتفك";
    }

    function getNumber() {
      alert(lang === "ar" ? "سيتم إرسال رقمك قريبًا" : "Your number will be sent soon");
    }

    function verify() {
      alert(lang === "ar" ? "سيتم إرسال رمز التحقق" : "Verification code will be sent");
    }
  </script>
</body>
</html>
